name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports (smoke test)
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET: test-secret
        run: python -c "import main; print('Backend OK')"

  # ── Frontend Build ───────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ── Docker Compose Smoke Test ────────────────────────────────
  docker:
    name: Docker Compose — Smoke Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          echo "POSTGRES_USER=orbit" >> .env
          echo "POSTGRES_PASSWORD=testpass" >> .env
          echo "POSTGRES_DB=logistics" >> .env
          echo "JWT_SECRET=ci-test-secret" >> .env
          echo "VITE_API_URL=http://localhost:8000" >> .env

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d db backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then break; fi
            echo "Waiting... ($i)"
            sleep 3
          done

      - name: Tear down
        if: always()
        run: docker compose down -v
